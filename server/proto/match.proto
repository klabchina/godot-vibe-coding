syntax = "proto3";

package summer;
option csharp_namespace = "Server.Proto";

// Client → Server — 请求匹配
message MatchRequest {
    string player_id = 1;
    string player_name = 2;
}

// Client → Server — 取消匹配（仅 Waiting 状态有效）
message MatchCancel {
    string player_id = 1;
}

// Server → Client — 匹配成功
message MatchSuccess {
    string room_id = 1;
    repeated PlayerInfo players = 2;
    int32 random_seed = 3;
}

message PlayerInfo {
    string player_id = 1;
    string player_name = 2;
    int32 slot = 3; // 0 或 1
}
