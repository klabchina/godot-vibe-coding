syntax = "proto3";

package summer;
option csharp_namespace = "Server.Proto";

import "common.proto";

// Client → Server — 玩家移动操作（高频，每帧）
message PlayerMove {
    int32 tick = 1;      // 客户端帧号
    Vec2 move_dir = 2;   // 移动方向
}

// Client → Server — 玩家技能选择
message SkillChoice {
    int32 tick = 1;
    string skill_id = 2;
    int32 slot = 3;
}

// Client → Server — 玩家提交结束状态
message GameEndSubmit {
    int32 tick = 1;
    string reason = 2;   // Win / Lose / Surrender
}

// Server → Client — 输入帧广播（Lockstep）
message LockstepFrame {
    int32 frame = 1;
    repeated PlayerFrameInput inputs = 2;
    repeated SkillChoice skill_choices = 3;
}

message PlayerFrameInput {
    string player_id = 1;
    int32 slot = 2;
    Vec2 move_dir = 3;
}
